<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 128">
  <!-- Geometric Italian cypress tree — layered triangular canopy with trunk -->
  <!-- Dark-on-transparent version for GitHub READMEs -->

  <!-- Canopy: 4 overlapping triangles, narrow and tall -->
  <polygon points="32,4 22,36 42,36" />
  <polygon points="32,20 19,52 45,52" />
  <polygon points="32,38 17,68 47,68" />
  <polygon points="32,54 15,84 49,84" />

  <!-- Trunk -->
  <rect x="29" y="84" width="6" height="20" rx="1" />

  <style>
    polygon, rect { fill: #000; }
    @media (prefers-color-scheme: dark) {
      polygon, rect { fill: #fff; }
    }
  </style>
</svg>
